<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PalPanel Lite</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f8;
        color: #1f2937;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #d9e0e8;
        border-radius: 6px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #667085;
        line-height: 1.6;
      }

      code {
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PalPanel Lite</h1>
      <p>The backend is running. Build the web UI with <code>cd web && npm run build</code>, then restart or rebuild the binary.</p>
    </main>
  </body>
</html>
